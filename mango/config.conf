# ────────────────────────
# MONITORS
# ────────────────────────
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:144,x:0,y:0,scale:1.2
#monitorrule=name:DP-2,width:1920,height:1080,refresh:180,x:0,y:0,scale:1
#monitorrule=name:^eDP-1$,width:1280,height:720,refresh:144,x:0,y:0,scale:1
#monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:144,x:0,y:0,scale:1

# ────────────────────────
# AUTOSTART
# ────────────────────────
exec-once=dbus-update-activation-environment --all
exec-once=qs -c noctalia-shell
exec-once=blueman-applet
exec-once=nm-applet --indicator

# ────────────────────────
# CUSTOMIZATION
# ────────────────────────
borderpx=2
focuscolor=0x7aa2f7ff
bordercolor=0x24283bff
border_radius=6
blur=1
allow_tearing=2 #only keep enabled if running via startmango.sh from beamyyl/mango
#blur-optimized=0
shadows=1
shadows_size=7
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff
unfocused_opacity=0.8%
focused_opacity=1
blur_params_num_passes=3
blur_params_radius=5
layerrule=blur,quickshell

# ────────────────────────
# INPUT
# ────────────────────────
repeat_rate=25
repeat_delay=360
mouse_accel_profile=0

# ────────────────────────
# ANIMATIONS
# ────────────────────────
layer_animations=1
layer_animation_type_open=slide
layer_animation_type_close=zoom
animation_type_open=zoom
animation_type_close=zoom
animation_duration_open=400
animation_duration_close=400
animation_duration_move=200

# ────────────────────────
# KEYBINDS
# ────────────────────────
# Apps
bind=SUPER,Return,spawn,st
bind=CTRL+ALT,T,spawn,alacritty
bind=SUPER,E,spawn,pcmanfm
bind=SUPER,R,spawn,rofi -show drun
bind=NONE,Print,spawn_shell,grim -g "$(slurp)" - | wl-copy
# Sound
bind=NONE,XF86AudioRaiseVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ "5%+"
bind=NONE,XF86AudioLowerVolume,spawn_shell,wpctl set-volume @DEFAULT_SINK@ "5%-"
bind=NONE,XF86AudioMute,spawn_shell,wpctl set-mute @DEFAULT_SINK@ toggle
# Brightness
bind=NONE,XF86MonBrightnessUp,spawn_shell,brightnessctl set +5%
bind=NONE,XF86MonBrightnessDown,spawn_shell,brightnessctl set 5%-
# Session
bind=ALT,F4,killclient
bind=SUPER+SHIFT,E,quit
bind=SUPER+SHIFT,S,reload_config

# ────────────────────────
# WINDOW MANAGEMENT
# ────────────────────────
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
bind=SUPER,0,view,10
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9
bind=SUPER+SHIFT,0,tag,10
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER,F,togglefullscreen
bind=SUPER,T,togglefloating
bind=SUPER,N,switch_layout
bind=ALT,Tab,focusstack,next
bind=ALT+SHIFT,Tab,focusstack,prev
bind=SUPER,i,minimized
bind=ALT,z,toggle_scratchpad
drag_tile_to_tile=1
new_is_master=0
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
