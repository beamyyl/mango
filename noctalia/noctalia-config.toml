[bar.default]
background_opacity = 0.74999998323619366
capsule = true
capsule_thickness = 0.69999998807907104
end = [ "tray", "notifications", "network", "bluetooth", "volume", "brightness", "battery", "control-center", "session" ]
font_family = "Iosevka NFM"
font_weight = 900
margin_ends = 10
start = [ "launcher", "media", "workspaces" ]

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-2" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[osd]
position = "top_right"

    [osd.kinds]
    keyboard_layout = false
    lock_keys = false
    privacy = false

[shell]
clipboard_enabled = false
corner_radius_scale = 2.0
font_family = "AdwaitaMono Nerd Font Mono"
lang = "en"
settings_show_advanced = true

[theme]
builtin = "Tokyo-Night"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

[wallpaper]
directory = "~/walls/"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/beamy/walls/wall8.jpg"

    [wallpaper.last]
    path = "/home/beamy/walls/wall8.jpg"

    [wallpaper.monitors.DP-2]
    path = "/home/beamy/walls/wall8.jpg"

[widget.control-center]
glyph = "adjustments-horizontal"

[widget.media]
hide_when_no_media = true
max_length = 75
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.tray]
drawer = true
